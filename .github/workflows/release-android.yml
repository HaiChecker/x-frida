name: Release x-frida

on:
  push:
    tags:
      - '*'
  workflow_dispatch:

env:
  ANDROID_NDK_VERSION: r29
  # --- Stealth Configuration ---
  STEALTH_MEMFD_NAME: jit-cache
  STEALTH_THREAD_JS: Signal Catcher
  STEALTH_SERVER_NAME: media.codec
  STEALTH_HELPER_NAME: media.extractor
  STEALTH_GADGET_NAME: libhwui
  STEALTH_PORT: '52173'
  STEALTH_THREAD_MAIN: HwBinder:1
  STEALTH_THREAD_GADGET: RenderThread
  STEALTH_SERVER_DIR: com.android.providers.media
  STEALTH_MAGIC: deadbeefcafebabe

jobs:
  # ============================================================
  # Android builds using Frida's official container
  # ============================================================
  build-android:
    strategy:
      matrix:
        arch: [arm64, arm, x86_64, x86]
      fail-fast: false
    runs-on: ubuntu-latest
    container: ghcr.io/frida/x-tools-linux-x86_64:latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Set up NDK
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: ${{ env.ANDROID_NDK_VERSION }}
          add-to-path: false

      - name: Configure & Build
        run: |
          export ANDROID_NDK_ROOT="${{ steps.setup-ndk.outputs.ndk-path }}"
          export FRIDA_PREFIX="${{ github.workspace }}/dist"

          ./configure \
            "--prefix=$FRIDA_PREFIX" \
            --host=android-${{ matrix.arch }} \
            --without-prebuilds=sdk:host \
            -- \
            "-Dfrida-gum:stealth_memfd_name=$STEALTH_MEMFD_NAME" \
            "-Dfrida-gum:stealth_thread_js=$STEALTH_THREAD_JS" \
            "-Dfrida-core:stealth_server_name=$STEALTH_SERVER_NAME" \
            "-Dfrida-core:stealth_helper_name=$STEALTH_HELPER_NAME" \
            "-Dfrida-core:stealth_gadget_name=$STEALTH_GADGET_NAME" \
            "-Dfrida-core:stealth_port=$STEALTH_PORT" \
            "-Dfrida-core:stealth_thread_main=$STEALTH_THREAD_MAIN" \
            "-Dfrida-core:stealth_thread_gadget=$STEALTH_THREAD_GADGET" \
            "-Dfrida-core:stealth_server_dir=$STEALTH_SERVER_DIR" \
            "-Dfrida-core:stealth_magic=$STEALTH_MAGIC"

          make -j$(nproc)
          make install

      - name: Prepare release assets
        run: |
          mkdir -p release
          FRIDA_PREFIX="${{ github.workspace }}/dist"

          # Server
          if [ -f "$FRIDA_PREFIX/bin/$STEALTH_SERVER_NAME" ]; then
            xz -c "$FRIDA_PREFIX/bin/$STEALTH_SERVER_NAME" > "release/x-frida-server-android-${{ matrix.arch }}.xz"
          fi
          # Inject
          if [ -f "$FRIDA_PREFIX/bin/frida-inject" ]; then
            xz -c "$FRIDA_PREFIX/bin/frida-inject" > "release/x-frida-inject-android-${{ matrix.arch }}.xz"
          fi
          # Gadget
          GADGET=$(find "$FRIDA_PREFIX" -name "*.so" -path "*/frida-1.0/*" | head -1)
          if [ -n "$GADGET" ]; then
            xz -c "$GADGET" > "release/x-frida-gadget-android-${{ matrix.arch }}.so.xz"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: android-${{ matrix.arch }}
          path: release/*

  # ============================================================
  # Python: x-frida wheel for macOS (native build on macOS)
  # ============================================================
  build-python-macos:
    strategy:
      matrix:
        arch: [arm64, x86_64]
      fail-fast: false
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install build deps
        run: pip install setuptools wheel

      - name: Configure & Build
        run: |
          export FRIDA_PREFIX="${{ github.workspace }}/dist"

          ./configure \
            "--prefix=$FRIDA_PREFIX" \
            --host=macos-${{ matrix.arch }} \
            --without-prebuilds=sdk:host \
            --enable-frida-python \
            --enable-frida-tools \
            -- \
            "-Dfrida-gum:stealth_memfd_name=$STEALTH_MEMFD_NAME" \
            "-Dfrida-gum:stealth_thread_js=$STEALTH_THREAD_JS" \
            "-Dfrida-core:stealth_server_name=$STEALTH_SERVER_NAME" \
            "-Dfrida-core:stealth_helper_name=$STEALTH_HELPER_NAME" \
            "-Dfrida-core:stealth_gadget_name=$STEALTH_GADGET_NAME" \
            "-Dfrida-core:stealth_port=$STEALTH_PORT" \
            "-Dfrida-core:stealth_thread_main=$STEALTH_THREAD_MAIN" \
            "-Dfrida-core:stealth_thread_gadget=$STEALTH_THREAD_GADGET" \
            "-Dfrida-core:stealth_server_dir=$STEALTH_SERVER_DIR" \
            "-Dfrida-core:stealth_magic=$STEALTH_MAGIC"

          make -j$(sysctl -n hw.ncpu)
          make install

      - name: Build x-frida wheel
        run: |
          export FRIDA_PREFIX="${{ github.workspace }}/dist"
          export FRIDA_EXTENSION=$(find "$FRIDA_PREFIX" -name "_frida*.so" -o -name "_frida*.abi3.so" | head -1)
          case "${{ matrix.arch }}" in
            x86_64) export _PYTHON_HOST_PLATFORM=macosx-10.13-x86_64 ;;
            arm64)  export _PYTHON_HOST_PLATFORM=macosx-11.0-arm64 ;;
          esac
          cd subprojects/frida-python
          pip wheel -w "$FRIDA_PREFIX/wheels" --no-deps .

      - name: Build x-frida-tools wheel
        run: |
          export FRIDA_PREFIX="${{ github.workspace }}/dist"
          cd subprojects/frida-tools
          pip wheel -w "$FRIDA_PREFIX/wheels" --no-deps .

      - uses: actions/upload-artifact@v4
        with:
          name: python-macos-${{ matrix.arch }}
          path: ${{ github.workspace }}/dist/wheels/*.whl

  # ============================================================
  # Python: x-frida wheel for Linux x86_64
  # ============================================================
  build-python-linux:
    runs-on: ubuntu-latest
    container: ghcr.io/frida/x-tools-linux-x86_64:latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Install Python build deps
        run: pip install setuptools wheel

      - name: Configure & Build
        run: |
          export FRIDA_PREFIX="${{ github.workspace }}/dist"

          ./configure \
            "--prefix=$FRIDA_PREFIX" \
            --without-prebuilds=sdk:host \
            --enable-frida-python \
            --enable-frida-tools \
            -- \
            -Dlibdir=lib \
            "-Dfrida-gum:stealth_memfd_name=$STEALTH_MEMFD_NAME" \
            "-Dfrida-gum:stealth_thread_js=$STEALTH_THREAD_JS" \
            "-Dfrida-core:stealth_server_name=$STEALTH_SERVER_NAME" \
            "-Dfrida-core:stealth_helper_name=$STEALTH_HELPER_NAME" \
            "-Dfrida-core:stealth_gadget_name=$STEALTH_GADGET_NAME" \
            "-Dfrida-core:stealth_port=$STEALTH_PORT" \
            "-Dfrida-core:stealth_thread_main=$STEALTH_THREAD_MAIN" \
            "-Dfrida-core:stealth_thread_gadget=$STEALTH_THREAD_GADGET" \
            "-Dfrida-core:stealth_server_dir=$STEALTH_SERVER_DIR" \
            "-Dfrida-core:stealth_magic=$STEALTH_MAGIC"

          make -j$(nproc)
          make install

      - name: Build x-frida wheel
        run: |
          export FRIDA_PREFIX="${{ github.workspace }}/dist"
          export FRIDA_EXTENSION=$(find "$FRIDA_PREFIX" -name "_frida*.so" | head -1)
          export _PYTHON_HOST_PLATFORM=linux-x86_64
          cd subprojects/frida-python
          pip wheel -w "$FRIDA_PREFIX/wheels" --no-deps .

      - name: Build x-frida-tools wheel
        run: |
          export FRIDA_PREFIX="${{ github.workspace }}/dist"
          cd subprojects/frida-tools
          pip wheel -w "$FRIDA_PREFIX/wheels" --no-deps .

      - uses: actions/upload-artifact@v4
        with:
          name: python-linux-x86_64
          path: ${{ github.workspace }}/dist/wheels/*.whl

  # ============================================================
  # GitHub Release
  # ============================================================
  release:
    needs: [build-android, build-python-macos, build-python-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: assets/
          merge-multiple: true

      - name: Get version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "tag=dev-$(date +%Y%m%d-%H%M%S)" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "x-frida ${{ steps.version.outputs.tag }}"
          body: |
            ## x-frida ${{ steps.version.outputs.tag }}

            Anti-detection Frida with stealth optimizations.

            ### Install
            ```bash
            pip install x_frida-*.whl
            pip install x_frida_tools-*.whl
            ```

            ### Deploy
            ```bash
            xz -d x-frida-server-android-arm64.xz
            adb push x-frida-server-android-arm64 /data/local/tmp/${{ env.STEALTH_SERVER_NAME }}
            adb shell "su -c 'chmod 755 /data/local/tmp/${{ env.STEALTH_SERVER_NAME }} && /data/local/tmp/${{ env.STEALTH_SERVER_NAME }} &'"
            ```

            ### Connect
            ```bash
            x-frida -H 127.0.0.1:${{ env.STEALTH_PORT }} -n com.target.app -l script.js
            ```

            | Config | Value |
            |--------|-------|
            | Port | `${{ env.STEALTH_PORT }}` |
            | Magic | `${{ env.STEALTH_MAGIC }}` |
            | Server | `${{ env.STEALTH_SERVER_NAME }}` |
            | Gadget | `lib${{ env.STEALTH_GADGET_NAME }}.so` |
          files: assets/*
          fail_on_unmatched_files: false
